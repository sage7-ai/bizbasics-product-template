# Replace: PRODUCT_NAME, YOUR_NAMESPACE, PRODUCT_DOMAIN (e.g. myproduct.bizbasics.ai)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: PRODUCT_NAME
  namespace: YOUR_NAMESPACE
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - PRODUCT_DOMAIN
      secretName: bizbasics-tls
  rules:
    - host: PRODUCT_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-api
                port:
                  number: PRODUCT_PORT
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-api
                port:
                  number: PRODUCT_PORT
          - path: /bootstrap
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-api
                port:
                  number: PRODUCT_PORT
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-api
                port:
                  number: PRODUCT_PORT
          - path: /ready
            pathType: Prefix
            backend:
              service:
                name: PRODUCT_NAME-api
                port:
                  number: PRODUCT_PORT
